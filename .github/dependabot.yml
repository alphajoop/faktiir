version: 2
updates:
  # Root dependencies (Turbo, Biome, etc.)
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "04:00"
    open-pull-requests-limit: 10
    rebase-strategy: "auto"
    versioning-strategy: "increase"
    allow:
      - dependency-type: "all"
    ignore:
      - dependency-name: "pnpm"

  # API dependencies (NestJS, Prisma, etc.)
  - package-ecosystem: "bun"
    directory: "/apps/api"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "04:00"
    open-pull-requests-limit: 10
    rebase-strategy: "auto"
    versioning-strategy: "increase"
    allow:
      - dependency-type: "all"

  # Web dependencies (Next.js, React, etc.)
  - package-ecosystem: "bun"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "04:00"
    open-pull-requests-limit: 10
    rebase-strategy: "auto"
    versioning-strategy: "increase"
    allow:
      - dependency-type: "all"
