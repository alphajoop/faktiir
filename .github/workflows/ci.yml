name: CI/CD Pipeline

on:
  push:
  pull_request:

jobs:
  quality:
    name: Quality, Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      # 2️⃣ Setup Bun
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: bun install

      # 4️⃣ Setup Biome
      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: latest

      # 5️⃣ Run Biome
      - name: Run Biome
        run: biome ci .

      # 6️⃣ Build Next.js
      - name: Build Next.js
        run: bun run build
